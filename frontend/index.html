<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover:让内容延伸到刘海/圆角区,再用 CSS 安全区避让 -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <!-- iOS 添加到主屏幕后全屏独立运行(去掉 Safari 顶部/底部栏) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- 状态栏样式:black-translucent 让内容延伸到状态栏下方,状态栏半透明,
         我们的背景色就能透出来显示渐变,实现全屏沉浸 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NAS Reader" />
    <!-- theme-color 匹配登录页渐变主色调 -->
    <meta name="theme-color" content="#667eea" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <title>NAS Reader</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
